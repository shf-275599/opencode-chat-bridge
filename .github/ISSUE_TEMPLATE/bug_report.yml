name: Bug Report
description: 报告一个 bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug 描述
        请简要描述遇到的问题。

        ## 📋 复现步骤
        请提供详细的复现步骤：

        1. 
        2. 
        3. 

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望的结果是什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志/截图
      description: 如果有相关日志或截图，请附上。

  - type: input
    id: environment
    attributes:
      label: 环境信息
      description: "操作系统、Node 版本、依赖版本等"
    validations:
      required: true
